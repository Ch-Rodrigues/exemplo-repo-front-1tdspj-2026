<!DOCTYPE html>
 <!-- DTD é o Document Type Definition que informa para o navegador a versão do html que está sendo carregada. 
Assim o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica. 
 -->

<!-- ATRIBUTOS:
Os atributos são do tipo chave = valor.
Ex: lang="pt-BR", isso é um atirbuto que pode ir em qualquer tag de conteúdo. <html lang="pt-BR"> ... </html>
-->

<html lang="pt-BR">
</html>
